# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  build_and_deploy:
    concurrency:
      group: firebase-hosting-live
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Deploy live hosting channel
        run: |
          GAC=$(mktemp)
          trap 'rm -f "$GAC"' EXIT
          (umask 177; echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_BONNIE_LASS_FLORALS }}' > "$GAC")

          set +e
          OUTPUT=$(GOOGLE_APPLICATION_CREDENTIALS="$GAC" \
            npx firebase-tools@latest deploy --only hosting \
            --project bonnie-lass-florals --json 2>&1)
          EXIT=$?
          set -e

          echo "$OUTPUT"

          if [ $EXIT -ne 0 ]; then
            if [[ "$OUTPUT" == *"FAILED_PRECONDITION"* &&
              "$OUTPUT" == *"is the current active version"* ]]; then
              echo "Deploy skipped: live channel already has the latest content."
              exit 0
            fi
            echo "Firebase Hosting deploy failed with exit code $EXIT"
            exit $EXIT
          fi
